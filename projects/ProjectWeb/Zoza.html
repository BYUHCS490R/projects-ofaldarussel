<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramon Zosa</title>
    <link rel="stylesheet" href="ProjectDesign.css">
</head>
<body class="page5">

<header>
    <h1>Ramon Zosa</h1>
</header>

<nav>
    <a href="index.html">Home</a>
</nav>

<main>
    <div class="flex-container">
        <div class="text">
            <h2>Service & Legacy</h2>
            <p>Ramon Zosa served during WWII and contributed to the Filipino resistance. He is remembered for his dedication to defending the country.</p>
        </div>
        <div class="image">
            <img src="images/zosa.jpg" alt="Ramon Zosa">
        </div>
    </div>

    <div class="video-container">
        <h2>Video</h2>
        <video controls>
            <source src="videos/zosa.mp4" type="video/mp4">
        </video>
    </div>

    <div class="form-section">
        <h2>Feedback Form</h2>
        <form>
            <input type="text" placeholder="Name" required><br>
            <input type="email" placeholder="Email" required><br>
            <select required>
                <option value="">Favorite Pilot</option>
                <option>Villamor</option>
                <option>Basa</option>
                <option>Peralta</option>
                <option>Bautista</option>
                <option>Zosa</option>
            </select><br>
            <textarea placeholder="Your message" required></textarea><br>
            <input type="submit" value="Submit">
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2026 Wings of Valor</p>
</footer>

</body>
</html>
